  name: Sync Colour Palette from Google Sheets

  on:
    schedule:
      - cron: '0 6 * * *'   # Runs every day at 6am UTC
    workflow_dispatch:       # Allows you to run it
  manually anytime

  permissions:
    contents: write          # Allows the action to
  commit back to the repo

  jobs:
    sync:
      runs-on: ubuntu-latest

      steps:
        - name: Check out repo
          uses: actions/checkout@v4

        - name: Fetch latest colour palette
          run: |
            curl -L "https://docs.google.com/spreadsheet
  s/d/1zNJYQhPKZy-lQnDqJIB3W4_h9a6_IbPNHqMRinXKn7Y/export?format=csv" \
              -o reference/PI-Colour-Palette.csv

        - name: Commit if changed
          run: |
            git config user.name "github-actions[bot]"
            git config user.email
  "github-actions[bot]@users.noreply.github.com"
            git add reference/PI-Colour-Palette.csv
            git diff --staged --quiet && echo "No
  changes" || \
              (git commit -m "Auto-sync: update colour
  palette from Google Sheets" && git push)

  Replace XXXXXXXXXXXXXXXX with your actual Sheet ID.
